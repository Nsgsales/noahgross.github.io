<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NoahGross.com</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #fff;
      color: #111;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
    }

    .container {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .prompt {
      font-size: 1.4rem;
      font-weight: 700;
      color: #111;
      margin: 0 0 20px 0;
      line-height: 1.3;
    }

    .reasons {
      list-style: disc;
      margin: 0 auto 24px auto;
      padding: 0 0 0 1.4em;
      display: inline-block;
      text-align: left;
    }

    .reasons li {
      font-size: 1.05rem;
      font-weight: 700;
      color: #111;
      padding: 5px 0;
    }

    .cta-text {
      font-size: 1rem;
      color: #444;
      margin: 0 0 24px 0;
    }

    .enter-btn {
      display: inline-block;
      padding: 14px 36px;
      border-radius: 999px;
      border: none;
      background: #2563eb;
      color: #fff;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
      transition: background 0.18s, box-shadow 0.18s, opacity 0.4s ease;
      user-select: none;
    }

    .enter-btn:hover {
      background: #1d4ed8;
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.45);
    }

    .bye-message {
      display: none;
      font-size: 1.5rem;
      font-weight: 700;
      color: #ff5252;
      opacity: 0;
      transition: opacity 0.8s ease;
      line-height: 1.35;
    }

    @media (max-width: 480px) {
      .prompt {
        font-size: 1.2rem;
      }
      .reasons li {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="prompt">If you're here, one of the following probably happened:</p>
    <ul class="reasons">
      <li>I emailed you and you got curious</li>
      <li>You Googled me</li>
      <li>You wanted to see if this domain was real</li>
      <li>Stalking me?</li>
      <li>Wrong tab</li>
      <li>FBI</li>
    </ul>
    <p class="cta-text">Either way, click below to enter the site.</p>
    <button class="enter-btn">Enter the site</button>
    <div class="bye-message">Welcome. The wi-fi gets worse from here.</div>
  </div>

  <script>
    (function () {
      var btn = document.querySelector('.enter-btn');
      var bye = document.querySelector('.bye-message');

      btn.addEventListener('click', function () {
        btn.style.opacity = '0';
        setTimeout(function () {
          btn.style.display = 'none';
          bye.style.display = 'block';
          setTimeout(function () { bye.style.opacity = '1'; }, 50);
        }, 400);
      });
    })();
  </script>
</body>
</html>
