<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NoahGross.com</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      background: #ffffff;
      color: #111111;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #ffffff;
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      box-sizing: border-box;
    }

    .intro {
      max-width: 720px;
      margin-bottom: 55px;
      animation: fadeIn 0.8s ease;
    }

    .intro h1 {
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.1;
      margin-bottom: 26px;
      color: #111111;
    }

    .reasons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      margin-bottom: 34px;
    }

    .reason {
      font-size: 1.08rem;
      color: #444444;
      padding: 10px 18px;
      border-radius: 999px;
      background: #f5f5f5;
      border: 1px solid #ececec;
      transition: transform 0.15s ease;
    }

    .reason:hover {
      transform: translateY(-1px);
    }

    .enter-line {
      font-size: 1rem;
      color: #666666;
      letter-spacing: 0.01em;
    }

    .button-zone {
      position: relative;
      width: 100%;
      height: 280px;
    }

    /* Main button */
    #runaway-btn {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      padding: 18px 36px;
      border-radius: 999px;
      border: none;
      background: #111111;
      color: #ffffff;
      font-weight: 600;
      cursor: pointer;
      font-size: 1.15rem;
      letter-spacing: -0.01em;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      transition:
        background 0.2s ease,
        box-shadow 0.2s ease,
        transform 0.1s ease;
      white-space: nowrap;
    }

    #runaway-btn:hover {
      background: #222222;
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.16);
    }

    #runaway-btn:active {
      transform: translate(-50%, -50%) scale(0.97);
    }

    /* Final message */
    #bye-message {
      display: none;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      color: #ff5252;
      text-align: center;
      opacity: 0;
      transition: opacity 0.8s ease;
      width: 100%;
      padding: 0 20px;
      box-sizing: border-box;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .reason {
        font-size: 0.98rem;
      }

      #runaway-btn {
        font-size: 1rem;
        padding: 16px 28px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="intro">

      <h1>
        If you’re here,<br>
        one of these probably happened.
      </h1>

      <div class="reasons">
        <div class="reason">I emailed you and you got curious</div>
        <div class="reason">You Googled me</div>
        <div class="reason">You wanted to see if this domain was real</div>
        <div class="reason">Stalking me?</div>
        <div class="reason">Wrong tab</div>
        <div class="reason">FBI</div>
      </div>

      <div class="enter-line">
        Either way, click below to enter the site.
      </div>

    </div>

    <div class="button-zone" id="button-zone">

      <button id="runaway-btn">
        Click here to enter website
      </button>

      <div id="bye-message">
        The button has left the chat.
      </div>

    </div>

  </div>

  <script>
    (function () {

      const btn = document.getElementById("runaway-btn");
      const zone = document.getElementById("button-zone");
      const bye = document.getElementById("bye-message");

      let attempts = 0;
      const maxAttempts = 10;

      const messages = [
        "Click here to enter website",
        "Almost.",
        "Not even close.",
        "Bro… stop.",
        "This website is not for you.",
        "Try again tomorrow.",
        "Seriously? This is what you’re doing with your day?"
      ];

      function updateMessage() {
        const idx = Math.min(attempts, messages.length - 1);
        btn.textContent = messages[idx];
      }

      function moveButton(increment = true) {

        if (attempts >= maxAttempts) return;

        const zoneRect = zone.getBoundingClientRect();
        const btnRect = btn.getBoundingClientRect();

        const padding = 20;

        const maxX = zoneRect.width - btnRect.width - padding;
        const maxY = zoneRect.height - btnRect.height - padding;

        const newX = padding + Math.random() * maxX;
        const newY = padding + Math.random() * maxY;

        btn.style.transform = "none";

        btn.style.left = newX + "px";
        btn.style.top = newY + "px";

        if (increment) {

          attempts++;
          updateMessage();

          if (attempts === maxAttempts) {

            btn.style.display = "none";
            bye.style.display = "block";

            setTimeout(() => {
              bye.style.opacity = "1";
            }, 50);
          }
        }
      }

      updateMessage();

      btn.addEventListener("mouseover", () => moveButton(true));
      btn.addEventListener("mouseenter", () => moveButton(true));

      btn.addEventListener("click", () => {
        alert("Impossible. You weren’t supposed to catch it.");
      });

    })();
  </script>

</body>
</html>
