<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NoahGross.com</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #fff;
      color: #111;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
    }

    .container {
      max-width: 480px;
      width: 100%;
      text-align: left;
    }

    .prompt {
      font-size: 1.4rem;
      font-weight: 700;
      color: #111;
      margin: 0 0 20px 0;
      line-height: 1.3;
    }

    .reasons {
      list-style: none;
      padding: 0;
      margin: 0 0 32px 0;
    }

    .reasons li {
      font-size: 1.05rem;
      color: #444;
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .reasons li:last-child {
      border-bottom: none;
    }

    .enter-btn {
      display: inline-block;
      padding: 14px 36px;
      border-radius: 999px;
      border: 2px solid #111;
      background: #fff;
      color: #111;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      transition: background 0.18s, color 0.18s, box-shadow 0.18s;
      text-decoration: none;
      user-select: none;
    }

    .enter-btn:hover,
    .enter-btn:active {
      background: #111;
      color: #fff;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.18);
    }

    @media (max-width: 480px) {
      .prompt {
        font-size: 1.2rem;
      }
      .reasons li {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="prompt">If you're here, one of the following probably happened:</p>
    <ul class="reasons">
      <li>I emailed you and you got curious</li>
      <li>You Googled me</li>
      <li>You wanted to see if this domain was real</li>
      <li>Stalking me?</li>
      <li>Wrong tab</li>
      <li>FBI</li>
    </ul>
    <button class="enter-btn">Enter the site</button>
  </div>
</body>
</html>
