<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NoahGross.com</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      color: #111111;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #ffffff;
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px 18px;
      box-sizing: border-box;
    }

    .intro {
      max-width: 720px;
      margin-bottom: 22px;
      animation: fadeIn 0.8s ease;
    }

    .intro h1 {
      font-size: clamp(1.7rem, 4vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.1;
      margin: 0 0 20px;
      color: #111111;
    }

    .reasons {
      display: flex;
      flex-direction: column;
      gap: 9px;
      align-items: center;
      margin-bottom: 22px;
    }

    .reason {
      position: relative;
      font-size: 1.02rem;
      color: #444444;
      padding: 8px 16px;
      border-radius: 999px;
      background: #f5f5f5;
      border: 1px solid #ececec;
      cursor: default;
      transition: all 0.2s ease;
    }

    .reason:hover {
      background: #111111;
      color: #ffffff;
      transform: translateY(-1px);
    }

    .reason::after {
      content: attr(data-hover);
      position: absolute;
      left: 50%;
      top: calc(100% + 8px);
      transform: translateX(-50%);
      background: #111111;
      color: #ffffff;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 0.85rem;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 20;
    }

    .reason:hover::after {
      opacity: 1;
    }

    .enter-line {
      font-size: 1rem;
      color: #666666;
    }

    .button-zone {
      position: relative;
      width: 100%;
      height: 160px;
      flex-shrink: 0;
    }

    #runaway-btn {
      position: absolute;
      left: 50%;
      top: 35%;
      transform: translate(-50%, -50%);
      padding: 16px 32px;
      border-radius: 999px;
      border: none;
      background: #111111;
      color: #ffffff;
      font-weight: 600;
      cursor: pointer;
      font-size: 1.08rem;
      letter-spacing: -0.01em;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.1s ease;
      white-space: nowrap;
      max-width: calc(100vw - 36px);
    }

    #runaway-btn:hover {
      background: #222222;
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.16);
    }

    #runaway-btn:active {
      transform: translate(-50%, -50%) scale(0.97);
    }

    #bye-message {
      display: none;
      position: absolute;
      left: 50%;
      top: 35%;
      transform: translate(-50%, -50%);
      font-size: clamp(1.8rem, 8vw, 3rem);
      font-weight: 700;
      color: #ff5252;
      text-align: center;
      opacity: 0;
      transition: opacity 0.8s ease;
      width: 100%;
      padding: 0 20px;
      box-sizing: border-box;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .container {
        justify-content: flex-start;
        padding-top: 36px;
      }

      .intro {
        margin-bottom: 12px;
      }

      .intro h1 {
        font-size: 1.75rem;
        margin-bottom: 16px;
      }

      .reasons {
        gap: 7px;
        margin-bottom: 16px;
      }

      .reason {
        font-size: 0.92rem;
        padding: 7px 13px;
      }

      .reason::after {
        font-size: 0.78rem;
        max-width: calc(100vw - 40px);
        white-space: normal;
        width: max-content;
      }

      .enter-line {
        font-size: 0.95rem;
      }

      .button-zone {
        height: 140px;
      }

      #runaway-btn {
        top: 32%;
        font-size: 0.95rem;
        padding: 14px 22px;
      }

      #bye-message {
        top: 32%;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="intro">
      <h1>If you’re here,<br>one of these probably happened.</h1>

      <div class="reasons">
        <div class="reason" data-hover="Honestly, fair.">
          I emailed you and you got curious
        </div>

        <div class="reason" data-hover="Dangerous amount of free time.">
          You Googled me
        </div>

        <div class="reason" data-hover="Surprisingly, yes.">
          You wanted to see if this domain was real
        </div>

        <div class="reason" data-hover="At least you’re being upfront about it.">
          Stalking me?
        </div>

        <div class="reason" data-hover="Happens more than you’d think.">
          Wrong tab
        </div>

        <div class="reason" data-hover="I invoke my right to remain confusing.">
          FBI
        </div>
      </div>

      <div class="enter-line">
        Either way, click below to enter the site.
      </div>
    </div>

    <div class="button-zone" id="button-zone">
      <button id="runaway-btn">Click here to enter website</button>
      <div id="bye-message">The button has left the chat.</div>
    </div>
  </div>

  <script>
    (function () {
      const btn = document.getElementById("runaway-btn");
      const zone = document.getElementById("button-zone");
      const bye = document.getElementById("bye-message");

      let attempts = 0;
      const maxAttempts = 10;

      const messages = [
        "Click here to enter website",
        "Almost.",
        "Not even close.",
        "Bro… stop.",
        "This website is not for you.",
        "Try again tomorrow.",
        "Seriously? This is what you’re doing with your day?"
      ];

      function updateMessage() {
        const idx = Math.min(attempts, messages.length - 1);
        btn.textContent = messages[idx];
      }

      function moveButton(increment = true) {
        if (attempts >= maxAttempts) return;

        const zoneRect = zone.getBoundingClientRect();
        const btnRect = btn.getBoundingClientRect();

        const padding = 12;
        const maxX = Math.max(0, zoneRect.width - btnRect.width - padding * 2);
        const maxY = Math.max(0, zoneRect.height - btnRect.height - padding * 2);

        const newX = padding + Math.random() * maxX;
        const newY = padding + Math.random() * maxY;

        btn.style.transform = "none";
        btn.style.left = newX + "px";
        btn.style.top = newY + "px";

        if (increment) {
          attempts++;
          updateMessage();

          if (attempts === maxAttempts) {
            btn.style.display = "none";
            bye.style.display = "block";

            setTimeout(() => {
              bye.style.opacity = "1";
            }, 50);
          }
        }
      }

      updateMessage();

      btn.addEventListener("mouseover", () => moveButton(true));
      btn.addEventListener("mouseenter", () => moveButton(true));

      btn.addEventListener("click", () => {
        alert("Impossible. You weren’t supposed to catch it.");
      });
    })();
  </script>
</body>
</html>
