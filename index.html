<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NoahGross.com</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      color: #111111;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
    }

    .playground {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 32px 24px;
      text-align: center;
    }

    #prompt-text {
      font-size: 1rem;
      font-weight: 500;
      color: #555;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    #btn-group {
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: opacity 0.5s ease;
    }

    .entry-btn {
      padding: 16px 36px;
      border-radius: 999px;
      border: 2px solid #111;
      background: #ffffff;
      color: #111111;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      transition: background 0.18s, color 0.18s, transform 0.12s, box-shadow 0.18s;
      white-space: nowrap;
    }

    .entry-btn:hover {
      background: #111111;
      color: #ffffff;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.18);
      transform: translateY(-2px);
    }

    .entry-btn:active {
      transform: translateY(0px) scale(0.97);
    }

    #bye-message {
      display: none;
      font-size: 2rem;
      font-weight: 700;
      color: #ff5252;
      text-align: center;
      opacity: 0;
      transition: opacity 0.8s ease;
      max-width: 520px;
      line-height: 1.35;
      padding: 0 16px;
    }
  </style>
</head>
<body>
  <div class="playground">
    <div id="prompt-text">Please state the nature of your visit</div>
    <div id="btn-group">
      <button class="entry-btn" data-msg="Bold. Most people at least stalk the LinkedIn first.">
        You Googled me?
      </button>
      <button class="entry-btn" data-msg="Same. It&rsquo;s a great email. Very enigmatic. Moving on.">
        Curious about my email?
      </button>
      <button class="entry-btn" data-msg="Congratulations. You&rsquo;ve made it. The wi-fi gets worse from here.">
        Just reached the end of the internet?
      </button>
    </div>
    <div id="bye-message"></div>
  </div>

  <script>
    (function () {
      const group = document.getElementById("btn-group");
      const prompt = document.getElementById("prompt-text");
      const bye = document.getElementById("bye-message");

      document.querySelectorAll(".entry-btn").forEach(function (btn) {
        btn.addEventListener("click", function () {
          const msg = btn.getAttribute("data-msg");

          // Fade out all buttons and prompt
          group.style.opacity = "0";
          prompt.style.opacity = "0";
          prompt.style.transition = "opacity 0.4s ease";

          setTimeout(function () {
            group.style.display = "none";
            prompt.style.display = "none";

            bye.innerHTML = msg;
            bye.style.display = "block";
            setTimeout(function () {
              bye.style.opacity = "1";
            }, 50);
          }, 500);
        });
      });
    })();
  </script>
</body>
</html>
