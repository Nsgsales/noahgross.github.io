<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NoahGross.com</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      background: #ffffff;
      color: #111111;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
    }

    .playground {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Big, obvious central button */
    #runaway-btn {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      padding: 16px 32px;
      border-radius: 999px;
      border: none;
      background: #1a73e8;
      color: #ffffff;
      font-weight: 600;
      cursor: pointer;
      font-size: 1.1rem;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.18);
      transition: transform 0.1s ease-out, background 0.2s, box-shadow 0.2s;
      white-space: nowrap;
    }

    #runaway-btn:hover {
      background: #4285f4;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.24);
    }

    #runaway-btn:active {
      transform: translate(-50%, -50%) scale(0.97);
    }

    /* Final message after the button disappears */
    #bye-message {
      display: none;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 2.2rem;
      font-weight: 700;
      color: #ff5252;
      text-align: center;
      opacity: 0;
      transition: opacity 0.8s ease;
      pointer-events: none;
      padding: 0 16px;
    }
  </style>
</head>
<body>
  <div class="playground" id="playground">
    <button id="runaway-btn">Click here to enter website</button>
    <div id="bye-message">The button has left the chat.</div>
  </div>

  <script>
    (function () {
      const btn = document.getElementById("runaway-btn");
      const area = document.getElementById("playground");
      const bye = document.getElementById("bye-message");

      let attempts = 0;
      const maxAttempts = 10;

      const messages = [
        "Click here to enter website",                         // 0 - initial
        "Almost.",                                             // 1
        "Not even close.",                                     // 2
        "Bro… stop.",                                          // 3
        "This website is not for you.",                        // 4
        "Try again tomorrow.",                                 // 5
        "Seriously? This is what you’re doing with your day?"  // 6+
      ];

      function updateMessage() {
        const idx = Math.min(attempts, messages.length - 1);
        btn.textContent = messages[idx];
      }

      function moveButton(increment = true) {
        if (attempts >= maxAttempts) return;

        const areaRect = area.getBoundingClientRect();
        const btnRect = btn.getBoundingClientRect();

        const padding = 20; // keep some margin from edges

        const maxX = areaRect.width - btnRect.width - padding;
        const maxY = areaRect.height - btnRect.height - padding;

        const newX = padding + Math.random() * maxX;
        const newY = padding + Math.random() * maxY;

        // remove the centering transform after first move
        btn.style.transform = "none";
        btn.style.left = newX + "px";
        btn.style.top = newY + "px";

        if (increment) {
          attempts++;
          updateMessage();

          if (attempts === maxAttempts) {
            // Hide button, show final message
            btn.style.display = "none";
            bye.style.display = "block";
            setTimeout(() => {
              bye.style.opacity = "1";
            }, 50);
          }
        }
      }

      // Start centered, first move happens on hover
      updateMessage();

      // Run whenever mouse gets near the button
      btn.addEventListener("mouseover", () => moveButton(true));
      btn.addEventListener("mouseenter", () => moveButton(true));

      // If they somehow manage to click it…
      btn.addEventListener("click", function () {
        alert("Impossible. You weren’t supposed to catch it.");
      });
    })();
  </script>
</body>
</html>
